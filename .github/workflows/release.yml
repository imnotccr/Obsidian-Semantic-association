name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest.json
        run: |
          node <<'NODE'
          const fs = require("fs");
          const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const tag = process.env.GITHUB_REF_NAME || "";

          if (!tag.startsWith("v")) {
            console.error(`Expected tag to start with "v", got "${tag}"`);
            process.exit(1);
          }

          const version = tag.slice(1);
          if (manifest.version !== version) {
            console.error(
              `manifest.json version "${manifest.version}" does not match tag "${version}"`
            );
            process.exit(1);
          }

          console.log(`OK: ${manifest.id} v${manifest.version}`);
          NODE

      - name: Package zip
        run: |
          PLUGIN_ID=$(node -p "require('./manifest.json').id")
          TAG=${GITHUB_REF_NAME}
          ZIP_NAME="${PLUGIN_ID}-${TAG}.zip"

          mkdir -p "release/${PLUGIN_ID}"
          cp dist/main.js dist/manifest.json dist/styles.css "release/${PLUGIN_ID}/"
          (cd release && zip -r "../${ZIP_NAME}" "${PLUGIN_ID}")

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
            ${{ env.ZIP_NAME }}
